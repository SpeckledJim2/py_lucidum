<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lucidum</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">
          <a class="mark-link" href="https://github.com/SpeckledJim2/py_lucidum" target="_blank" rel="noopener noreferrer" aria-label="Open py_lucidum on GitHub">
            <img class="mark" src="/favicon.ico" alt="" />
          </a>
          <span>lucidum</span>
        </div>
        <button id="sidebarToggleBtn" class="sidebar-toggle" type="button" aria-label="Hide sidebar" aria-controls="appSidebar" aria-expanded="true" title="Hide sidebar">
          <span class="sidebar-toggle-icon" aria-hidden="true"></span>
        </button>
        <div id="datasetMeta" class="meta">Loading dataset...</div>
        <div class="spacer"></div>
        <button id="reloadBtn" class="ghost">Reload</button>
        <button id="themeBtn" class="ghost">Dark</button>
        <button id="stopAppBtn" class="danger-action">Stop app</button>
      </header>

      <div class="shell">
        <aside id="appSidebar">
          <section id="toolSelectorSection" class="section tool-selector-section">
            <div class="tool-selector">
              <button id="lineBarTool" class="tool-option active" type="button" data-tool="line_bar">
                <span class="tool-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false"><path d="M4 19h16M7 16V9m5 7V5m5 11v-4M6 11l4-4 4 5 4-3" /></svg>
                </span>
                <span>Line and bar</span>
              </button>
              <button id="ukMapTool" class="tool-option" type="button" data-tool="uk_map">
                <span class="tool-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false"><path d="M9 18l-5 2V6l5-2 6 2 5-2v14l-5 2-6-2Zm0 0V4m6 16V6" /></svg>
                </span>
                <span>UK mapping</span>
              </button>
            </div>
          </section>

          <section class="section">
            <div class="metric-row">
              <div id="actualMetricTitle" class="metric-title">Actual</div>
              <select id="actualNumerator"></select>
            </div>
            <div class="metric-row">
              <div id="weightMetricTitle" class="metric-title">Weight</div>
              <select id="denominator"></select>
            </div>
          </section>

          <section class="section sidebar-filter-section">
            <div id="sidebarFilterResizer" class="sidebar-filter-resizer" role="separator" aria-orientation="horizontal" aria-label="Resize filter controls"></div>
            <h2>Filter</h2>
            <div class="filter-input-row">
              <input id="filterInput" placeholder="DuckDB WHERE expression" />
              <button id="filterApplyBtn" class="filter-action" type="button" title="Apply filter" aria-label="Apply filter">&#9654;</button>
              <button id="filterClearBtn" class="filter-action" type="button" title="Clear filter" aria-label="Clear filter">&times;</button>
            </div>
            <select id="savedFilterSelect" size="8" multiple></select>
            <div class="filter-operator" data-control="filterOperator">
              <button data-value="and" class="active" type="button">AND</button>
              <button data-value="or" type="button">OR</button>
              <button data-value="nand" type="button">NAND</button>
              <button data-value="nor" type="button">NOR</button>
            </div>
          </section>
        </aside>

        <div id="sidebarResizer" class="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>

        <main>
          <div id="lineBarToolbar" class="toolbar">
            <div id="sortControl" class="control">
              <h3>x-axis sort order</h3>
              <div class="segmented" data-control="sort">
                <button data-value="alpha" class="active">A-Z</button>
                <button data-value="volume">Weight</button>
                <button data-value="actual">Actual</button>
                <button id="expectedSortButton" data-value="expected" class="hidden">Expected</button>
              </div>
            </div>
            <div class="control">
              <h3>Group low weights</h3>
              <div class="segmented" data-control="lowGroup">
                <button data-value="0" class="active">0</button>
                <button data-value="10">10</button>
                <button data-value="100">100</button>
                <button data-value="0.1%">0.1%</button>
                <button data-value="1%">1%</button>
              </div>
            </div>
            <div class="control">
              <h3>Labels</h3>
              <div class="segmented" data-control="labels">
                <button data-value="none" class="active">-</button>
                <button data-value="bar">Bar</button>
                <button data-value="line">Line</button>
                <button data-value="all">All</button>
              </div>
            </div>
            <div id="bandControl" class="control">
              <h3>Banding <span id="bandValue"></span></h3>
              <div class="segmented" data-control="bandWidth">
                <button data-action="band-down">&lt;</button>
                <button data-value="0" class="active">-</button>
                <button data-value="0.1">0.1</button>
                <button data-value="1">1</button>
                <button data-value="5">5</button>
                <button data-value="10">10</button>
                <button data-action="band-up">&gt;</button>
              </div>
            </div>
            <div id="dateControl" class="control">
              <h3>Date bucket</h3>
              <div class="segmented" data-control="dateBucket">
                <button data-value="none" class="active">-</button>
                <button data-value="hour">Hour</button>
                <button data-value="day">Day</button>
                <button data-value="week">Week</button>
                <button data-value="month">Month</button>
                <button data-value="year">Year</button>
              </div>
            </div>
            <div class="control">
              <h3>Response transform</h3>
              <div class="segmented" data-control="transform">
                <button data-value="none" class="active">-</button>
                <button data-value="log">Log</button>
                <button data-value="exp">Exp</button>
                <button data-value="logit">Logit</button>
                <button data-value="zero">0</button>
                <button data-value="one">1</button>
              </div>
            </div>
            <div class="control">
              <h3>Sigma bars</h3>
              <div class="segmented" data-control="sigma">
                <button data-value="0" class="active">-</button>
                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="5">5</button>
              </div>
            </div>
            <div id="status" class="status"></div>
          </div>

          <div id="visualArea" class="visual-area">
            <div id="chartSideControls" class="chart-side-controls">
              <section class="chart-side-section feature-section">
                <div class="section-title-row">
                  <h2>x-axis feature</h2>
                  <div class="segmented" data-control="featureSort">
                    <button data-value="original" class="active">Original</button>
                    <button data-value="alpha">A-Z</button>
                  </div>
                </div>
                <input id="featureSearch" class="search" placeholder="search" />
                <div id="featureList" class="feature-list"></div>
              </section>

              <div id="chartControlHeightResizer" class="chart-control-height-resizer" role="separator" aria-orientation="horizontal" aria-label="Resize x-axis and expected controls"></div>

              <section class="chart-side-section">
                <div class="section-title-row">
                  <h2 id="expectedMetricTitle" class="metric-title">Expected</h2>
                  <div class="segmented" data-control="expectedSort">
                    <button data-value="original" class="active">Original</button>
                    <button data-value="alpha">A-Z</button>
                  </div>
                </div>
                <select id="expectedNumerator" class="hidden" aria-hidden="true" tabindex="-1"></select>
                <input id="expectedSearch" class="search" placeholder="search" />
                <div id="expectedList" class="feature-list"></div>
              </section>
            </div>

            <div id="chartControlsResizer" class="chart-controls-resizer" role="separator" aria-orientation="vertical" aria-label="Resize chart controls"></div>

            <section class="workspace">
              <div id="lineBarTabs" class="tabs workspace-tabs">
                <button id="chartTab" class="tab active">Chart</button>
                <button id="tableTab" class="tab">Table</button>
              </div>
              <div class="workspace-messages">
                <div id="groupMeta" class="workspace-meta"></div>
                <div id="chartMessage" class="chart-message hidden"></div>
              </div>
              <div id="chart"></div>
              <div id="tableWrap" class="table-wrap hidden"></div>
              <div id="ukMap" class="uk-map hidden"></div>
              <div id="mapFloatingControl" class="map-floating-control hidden">
                <div class="map-floating-header">
                  <strong id="mapControlMetric">Actual</strong>
                  <span id="mapControlFilter">no filter</span>
                </div>
                <div class="map-floating-row">
                  <div class="postcode-search">
                    <input id="mapPostcodeInput" placeholder="postcode..." />
                    <button id="mapPostcodeClear" type="button" title="Clear postcode" aria-label="Clear postcode">&times;</button>
                    <button id="mapPostcodeSearch" type="button" title="Search postcode" aria-label="Search postcode">
                      <svg viewBox="0 0 24 24" focusable="false"><circle cx="11" cy="11" r="7"></circle><path d="m16.5 16.5 4 4"></path></svg>
                    </button>
                  </div>
                  <div class="map-palette-buttons" aria-label="Choropleth colour scheme">
                    <button class="map-palette-button active" type="button" data-palette="divergent" title="Divergent">
                      <span class="palette-swatch palette-divergent"></span>
                    </button>
                    <button class="map-palette-button" type="button" data-palette="spectral" title="Spectral">
                      <span class="palette-swatch palette-spectral"></span>
                    </button>
                    <button class="map-palette-button" type="button" data-palette="viridis" title="Viridis">
                      <span class="palette-swatch palette-viridis"></span>
                    </button>
                  </div>
                  <div class="map-background-buttons" aria-label="Map background">
                    <button class="map-background-button" type="button" data-map-background="light" title="White map background">
                      <span class="background-swatch background-light"></span>
                    </button>
                    <button class="map-background-button active" type="button" data-map-background="dark" title="Dark grey map background">
                      <span class="background-swatch background-dark"></span>
                    </button>
                  </div>
                </div>
                <div class="map-slider-grid">
                  <label class="map-slider-control">
                    <span>Line thickness</span>
                    <span class="slider-scale"><b>0</b><b id="mapLineWeightValue">1</b><b>5</b></span>
                    <input id="mapLineWeight" type="range" min="0" max="5" step="1" value="1" />
                  </label>
                  <label class="map-slider-control">
                    <span>Opacity</span>
                    <span class="slider-scale"><b>0</b><b id="mapOpacityValue">1</b><b>1</b></span>
                    <input id="mapOpacity" type="range" min="0" max="1" step="0.2" value="1" />
                  </label>
                  <label class="map-slider-control">
                    <span>Hot/not-spots</span>
                    <span class="slider-scale"><b>-20</b><b id="mapHotspotsValue">0</b><b>20</b></span>
                    <input id="mapHotspots" type="range" min="-20" max="20" step="5" value="0" />
                  </label>
                  <label class="map-slider-control">
                    <span>Label size</span>
                    <span class="slider-scale"><b>0</b><b id="mapLabelSizeValue">0</b><b>20</b></span>
                    <input id="mapLabelSize" type="range" min="0" max="20" step="1" value="0" />
                  </label>
                </div>
              </div>
              <div id="mapLegend" class="map-legend hidden"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
